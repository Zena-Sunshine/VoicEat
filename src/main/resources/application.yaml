server:
  port: 8081
spring:
  cloud:
    sentinel:
      transport:
        dashboard: localhost:8090
  rabbitmq:
    publisher-confirm-type: correlated # 开启生产者确认
    publisher-returns: true # 开启publisher return机制
    template:
      mandatory: true # 确保消息路由失败时触发回退
    host: 127.0.0.1 # IP地址
    port: 5672 # 端口号
    username: hmdianping # 用户名
    password: 123456 # 密码
    virtual-host: /hmdianping
    listener:
      simple:
        retry:
          enabled: true # 开启消费者失败重试
          initial-interval: 1000ms # 初识的失败等待时长为1秒
          multiplier: 2 # 失败的等待时长倍数，下次等待时长 = multiplier * last-interval
          max-attempts: 3 # 最大重试次数
          stateless: false # true无状态；false有状态。如果业务中包含事务，这里改为false
        concurrency: 1
        max-concurrency: 1
        acknowledge-mode: manual
        prefetch: 10  # 限流：每次最多取10条消息，避免消费堆积
  application:
    name: hmdp
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/hmdp?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: 123456
  redis:
    host: 192.168.126.130
    port: 6379
    password: 123456
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
mybatis-plus:
  type-aliases-package: com.hmdp.entity # 别名扫描包
logging:
  level:
    com.hmdp: debug

hm:
  jwt:
    secret: your-256-bit-secret-key-base64-encoded-or-plain-text   # 请使用足够长的密钥
    access-token-expire: 1800000        # 30分钟（毫秒）
    refresh-token-expire: 604800000     # 7天（毫秒）

canal:
  server: 127.0.0.1:11111          # Canal 服务器的地址和端口
  destination: example              # Canal 实例名称（默认为 example）